<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAN — Deep Agent Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="15" stroke="url(#g)" stroke-width="1.8"/>
          <path d="M10 21L16 10L22 21" stroke="url(#g)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 17.5H20" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>
          <defs>
            <linearGradient id="g" x1="0" y1="0" x2="32" y2="32">
              <stop offset="0%" stop-color="#007AFF"/>
              <stop offset="100%" stop-color="#5856D6"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="logo-text">
          <span class="logo-name">DAN</span>
          <span class="logo-sub">Deep Agent Network</span>
        </div>
      </div>
      <div class="header-meta">
        <span class="meta-badge">META · HEURISTIC · PARAM · LOSS</span>
      </div>
    </div>
  </header>

  <!-- Main layout -->
  <main class="main">

    <!-- Quad input grid -->
    <div class="quad-grid">

      <!-- META -->
      <section class="quad-card" id="card-meta">
        <div class="card-header">
          <div class="card-badge meta-badge">META</div>
          <h2 class="card-title">任务配置</h2>
          <p class="card-desc">超参 · 迭代上限 · 停止条件</p>
        </div>
        <div class="card-body">
          <textarea
            id="meta-input"
            class="code-area"
            spellcheck="false"
            placeholder='{
  "name": "CodeOptimize",
  "max_iterations": 5,
  "stop_if": "loss.mi >= 65"
}'></textarea>
          <div class="card-footer">
            <span class="char-count" id="meta-count">0 chars</span>
          </div>
        </div>
      </section>

      <!-- HEURISTIC -->
      <section class="quad-card" id="card-heuristic">
        <div class="card-header">
          <div class="card-badge heuristic-badge">HEURISTIC</div>
          <h2 class="card-title">搜索策略</h2>
          <p class="card-desc">先验 · 规则 · 引导方式</p>
        </div>
        <div class="card-body">
          <textarea
            id="heuristic-input"
            class="code-area"
            spellcheck="false"
            placeholder="1. 忘记之前的任务，这是一次全新任务。
2. 根据 loss/target.md 目标优化代码。
3. 不允许用自动化脚本。
4. 输出每次优化的思考过程。"></textarea>
          <div class="card-footer">
            <span class="char-count" id="heuristic-count">0 chars</span>
          </div>
        </div>
      </section>

      <!-- PARAM -->
      <section class="quad-card" id="card-param">
        <div class="card-header">
          <div class="card-badge param-badge">PARAM</div>
          <h2 class="card-title">优化主体</h2>
          <p class="card-desc">代码 · 系数 · 配置</p>
        </div>
        <div class="card-body">
          <textarea
            id="param-input"
            class="code-area"
            spellcheck="false"
            placeholder="# Paste your code here...
# e.g. def create_order(...): ..."></textarea>
          <div class="card-footer">
            <span class="char-count" id="param-count">0 chars</span>
          </div>
        </div>
      </section>

      <!-- LOSS -->
      <section class="quad-card" id="card-loss">
        <div class="card-header">
          <div class="card-badge loss-badge">LOSS</div>
          <h2 class="card-title">损失函数</h2>
          <p class="card-desc">评估指标 · 目标数据 · 反馈信号</p>
        </div>
        <div class="card-body">
          <textarea
            id="loss-input"
            class="code-area"
            spellcheck="false"
            placeholder="# Python evaluator:
# print(json.dumps({'loc': loc, 'avg_cc': cc}))

# Or CSV data:
# x,y
# 1.0,2.1
# 2.0,4.2"></textarea>
          <div class="card-footer">
            <span class="char-count" id="loss-count">0 chars</span>
          </div>
        </div>
      </section>

    </div>

    <!-- Run bar -->
    <div class="run-bar">
      <div class="run-bar-left">
        <button id="run-btn" class="run-btn">
          <svg class="run-icon" viewBox="0 0 20 20" fill="none">
            <path d="M6 4L16 10L6 16V4Z" fill="currentColor"/>
          </svg>
          运行优化
        </button>
        <button id="stop-btn" class="stop-btn" style="display:none">
          <svg viewBox="0 0 20 20" fill="none">
            <rect x="4" y="4" width="12" height="12" rx="2" fill="currentColor"/>
          </svg>
          停止
        </button>
        <button id="clear-btn" class="clear-btn">清空输出</button>
      </div>
      <div class="run-bar-right">
        <span class="run-status" id="run-status"></span>
      </div>
    </div>

    <!-- Output -->
    <section class="output-section">
      <div class="output-header">
        <div class="output-header-left">
          <div class="output-badge">OUTPUT</div>
          <h2 class="output-title">执行日志</h2>
        </div>
        <button id="copy-output" class="clear-btn">复制</button>
      </div>
      <div class="output-body" id="output-body">
        <div class="output-placeholder" id="output-placeholder">
          <svg class="placeholder-icon" viewBox="0 0 64 64" fill="none">
            <circle cx="32" cy="32" r="28" stroke="#E5E5EA" stroke-width="1.5"/>
            <path d="M20 32L28 40L44 24" stroke="#E5E5EA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <p>填写上方四元组，点击「运行优化」开始</p>
        </div>
      </div>
    </section>

  </main>

  <script src="/static/app.js"></script>
</body>
</html>
